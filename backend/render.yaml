services:
  - type: web
    name: ast-smart-analyzer-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: ast_db
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
